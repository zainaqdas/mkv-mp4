<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKV Player</title>

<style>
body {
  background: #0d0d0f;
  color: white;
  font-family: sans-serif;
  text-align: center;
  padding: 40px;
}
input {
  width: 60%;
  padding: 10px;
}
button {
  padding: 10px 20px;
  margin-left: 10px;
}
video {
  width: 100%;
  max-width: 900px;
  margin-top: 30px;
}
</style>
</head>

<body>

<h1>MKV Stream Player 🚀</h1>

<input type="text" id="url-input" placeholder="Paste video URL here">
<button onclick="playVideo()">Play</button>

<br>

<video id="video" controls></video>

<script>
const BACKEND = "https://mkv-mp4-production.up.railway.app";

function playVideo() {
  const url = document.getElementById("url-input").value.trim();
  if (!url) {
    alert("Enter a URL");
    return;
  }

  const video = document.getElementById("video");

  // 🚀 Stream from your Railway backend
  video.src = `${BACKEND}/stream?url=${encodeURIComponent(url)}`;
}
</script>

</body>
</html>
